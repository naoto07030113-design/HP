<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>治療院SaaS プレビュー</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8faf9;margin:0;color:#0f3d2e}
    .wrap{max-width:1100px;margin:0 auto;padding:20px}
    .hero{background:linear-gradient(135deg,#0f3d2e,#6f8f7c);color:#fff;padding:20px;border-radius:18px}
    .grid{display:grid;gap:12px}
    .kpi{grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-top:14px}
    .card{background:#fff;border:1px solid #e4e8e7;border-radius:14px;padding:12px}
    .board{grid-template-columns:repeat(auto-fit,minmax(280px,1fr));margin-top:16px}
    .col{height:520px;position:relative;background:#f6f7f8;border-radius:12px;padding:10px}
    .res{position:absolute;left:10px;right:10px;border-radius:10px;padding:8px;border:1px solid}
    .b{background:#dff6e8;border-color:#9adbb1}.v{background:#dcecff;border-color:#96bff5}.bl{background:#ffeecf;border-color:#ffd77d}
    .form{max-width:420px;margin-top:20px}
    input,select,button{width:100%;padding:10px;border-radius:10px;border:1px solid #d3d9d7;margin-top:8px}
    button{background:#0f3d2e;color:#fff;border:none;font-weight:700}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero"><h1>予約管理CRM / 患者予約（静的プレビュー）</h1><p>依存インストール不要でUI確認できます</p></div>
  <div class="grid kpi">
    <div class="card"><small>来院数</small><h3>142</h3></div>
    <div class="card"><small>新患数</small><h3>26</h3></div>
    <div class="card"><small>リピート率</small><h3>78%</h3></div>
    <div class="card"><small>売上</small><h3>¥1,982,000</h3></div>
  </div>
  <div class="grid board">
    <div class="card"><strong>田中先生</strong><div class="col"><div class="res b" style="top:40px;height:95px">山田 花子 / 美容鍼75分</div></div></div>
    <div class="card"><strong>佐藤先生</strong><div class="col"><div class="res v" style="top:80px;height:55px">高橋 一郎 / 整体45分</div></div></div>
    <div class="card"><strong>鈴木先生</strong><div class="col"><div class="res bl" style="top:200px;height:110px">ブロック時間 / 休憩</div></div></div>
  </div>
  <div class="card form">
    <h3>患者予約</h3>
    <input type="date" />
    <select><option>メニューを選択</option><option>美容鍼 75分</option></select>
    <select><option>担当を選択</option><option>指名なし</option><option>田中先生</option></select>
    <input placeholder="紹介者氏名（任意）" />
    <button>予約する</button>
  </div>
</div>
</body>
</html>
